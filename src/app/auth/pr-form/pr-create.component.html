<div class="container-fluid mt-4">
  <div class="form-wrapper">
    <h2>Create Purchase Request</h2>

    <form (ngSubmit)="submitPR()">
      <!-- Title -->
      <div class="form-group">
        <label>PR Title</label>
        <input class="form-control" [(ngModel)]="pr.title" name="title" required />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea
          class="form-control"
          rows="2"
          [(ngModel)]="pr.description"
          name="description"
        ></textarea>
      </div>

      <!-- Items -->
      <h4 class="section-title">Items</h4>

      <div class="table-wrapper">
        <div class="table-responsive">
          <table class="table">
            <thead class="table-dark">
              <tr>
                <th>Item</th>
                <th>HSN</th>
                <th>Code</th>
                <th>Qty</th>
                <th>Cost</th>
                <th>MRP</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let item of pr.items; let i = index">
                <td>
                  <input
                    class="form-control"
                    [(ngModel)]="item.itemName"
                    name="name{{ i }}"
                    required
                  />
                </td>
                <td>
                  <input
                    class="form-control"
                    [(ngModel)]="item.hsnNumber"
                    name="hsn{{ i }}"
                    required
                  />
                </td>
                <td>
                  <input class="form-control" [(ngModel)]="item.itemCode" name="code{{ i }}" />
                </td>

                <td>
                  <input
                    type="number"
                    min="1"
                    class="form-control"
                    [(ngModel)]="item.quantity"
                    name="qty{{ i }}"
                    (input)="updateTotals()"
                  />
                </td>

                <td>
                  <input
                    type="number"
                    min="1"
                    class="form-control"
                    [(ngModel)]="item.costPrice"
                    name="price{{ i }}"
                    (input)="updateTotals()"
                  />
                </td>

                <td>
                  <input
                    type="number"
                    min="1"
                    class="form-control"
                    [(ngModel)]="item.Mrp"
                    name="mrp{{ i }}"
                  />
                </td>

                <td class="total-cell">₹ {{ item.total }}</td>

                <td class="text-center">
                  <button type="button" class="btn btn-danger btn-sm" (click)="removeItem(i)">
                    ✕
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Add Button -->
      <button type="button" class="btn btn-secondary btn-sm mt-2" (click)="addItem()">
        + Add Item
      </button>

      <!-- Total -->
      <div class="total-section">
        Total Amount: <span>₹ {{ pr.amount }}</span>
      </div>

      <!-- Submit -->
      <button class="btn btn-success submit-btn">Submit Purchase Request</button>
    </form>
  </div>
</div>

<div class="container-fluid mt-4">
  <div class="table-wrapper">
    <div style="justify-content: space-between; display: flex">
      <h2>Stock List</h2>
      <div class="row mb-3">
        <div class="col-md-4">
          <input
            type="text"
            class="form-control"
            placeholder="Item Name"
            [(ngModel)]="searchText"
            (input)="onSearchChange()"
          />
        </div>
      </div>
    </div>

    <table class="table">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Item</th>
          <th>Batch</th>
          <th>Sale Price</th>
          <th>Cost</th>
          <th>MRP</th>
          <th>Sale Price</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let stock of filteredStocks">
          <td>{{ stock.id }}</td>
          <td>{{ stock.itemName }}</td>
          <td>{{ stock.batch }}</td>

          <td>
            ₹ {{ (stock.salePrice != null ? stock.salePrice : stock.costPrice * 1.2) | number }}
          </td>

          <td>₹ {{ stock.costPrice | number }}</td>
          <td>₹ {{ stock.mrp | number }}</td>

          <td>
            <input
              type="number"
              [(ngModel)]="stock.newSalePrice"
              placeholder="Enter Price"
              class="form-control"
            />
          </td>

          <td>
            <button class="btn btn-success btn-sm" (click)="savePrice(stock)">Save</button>
          </td>
        </tr>

        <tr *ngIf="filteredStocks.length === 0">
          <td colspan="8" class="text-center">No stock found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
